services:
  db:
    image: postgres:16
    container_name: aries_mod_db
    restart: unless-stopped
    shm_size: "512mb"
    environment:
      POSTGRES_USER: aries
      POSTGRES_PASSWORD: wYIYc7spXU6OpAb8ocPsyAMZlB1SeZwQ7Vr+qokbvrc=
      POSTGRES_DB: aries_mod
    volumes:
      - db_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c effective_cache_size=1GB
      -c max_connections=30
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c autovacuum_vacuum_scale_factor=0.05
      -c autovacuum_analyze_scale_factor=0.02

  api:
    build: .
    container_name: ariesmod-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://aries:wYIYc7spXU6OpAb8ocPsyAMZlB1SeZwQ7Vr+qokbvrc=@db:5432/aries_mod
      PORT: 4000
    depends_on:
      - db
    ports:
      - "4000:4000"

volumes:
  db_data:
